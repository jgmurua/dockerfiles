name: helm-validate

on:
  pull_request:
    paths:
      - "charts/**"
      - "k8s/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install helm
        uses: azure/setup-helm@v4
      - name: Helm lint
        run: |
          for chart in charts/*; do
            [ -d "$chart" ] || continue
            helm lint "$chart"
            helm template test "$chart" > /tmp/rendered.yaml
          done
