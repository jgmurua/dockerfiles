apiVersion: batch/v1
kind: Job
metadata:
  name: my-job
  namespace: my-app
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: job
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args: ["echo hello"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
